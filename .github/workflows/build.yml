name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # macOS — for local dev / Apple Silicon + Intel
  # ---------------------------------------------------------------------------
  build-mac:
    runs-on: macos-latest
    continue-on-error: true       # secondary platform — never block the Windows artifact
    steps:
      - uses: actions/checkout@v4

      - name: Install LAME + libshout
        run: brew install lame libshout

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UG6Broadcaster-macOS
          path: build/UG6Broadcaster_artefacts/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows — produces a portable .exe bundle (UG6 + DLLs) for Win7+ / Win10 / Win11.
  # Uses vcpkg to fetch LAME + libshout + their transitive deps (ogg, vorbis,
  # speex, theora). All DLLs are copied next to UG6Broadcaster.exe so the user
  # just unzips and runs.
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-2022
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ runner.os }}-mp3lame-libshout-v1

      - name: Setup vcpkg (fresh clone of master to ensure libshout port is present)
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\vcpkg")) {
            git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          } else {
            cd C:\vcpkg
            git pull --rebase --depth 1
          }
          cd C:\vcpkg
          .\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: vcpkg install LAME + libshout
        shell: pwsh
        run: |
          # libshout's vcpkg port marks itself "!windows" but builds fine in
          # practice — we override the check. mp3lame is officially supported.
          & "C:\vcpkg\vcpkg.exe" install mp3lame:x64-windows libshout:x64-windows --allow-unsupported

      - name: Configure CMake (vcpkg toolchain)
        shell: pwsh
        run: |
          cmake -B build -A x64 `
            "-DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Locate built binary
        shell: pwsh
        run: |
          Write-Host "==> Built artefacts tree:"
          Get-ChildItem -Recurse build\UG6Broadcaster_artefacts | Select-Object FullName

      - name: Bundle runtime DLLs next to the .exe
        shell: pwsh
        run: |
          $binDir = (Get-ChildItem -Recurse -File -Include "UG6Broadcaster.exe" build\UG6Broadcaster_artefacts | Select-Object -First 1).Directory.FullName
          Write-Host "Binary directory: $binDir"
          $vcpkgBin = "C:\vcpkg\installed\x64-windows\bin"
          Write-Host "Copying DLLs from $vcpkgBin to $binDir"
          Copy-Item "$vcpkgBin\*.dll" $binDir -Force
          Get-ChildItem $binDir

      - name: Copy README + build info into the artifact
        shell: pwsh
        run: |
          $binDir = (Get-ChildItem -Recurse -File -Include "UG6Broadcaster.exe" build\UG6Broadcaster_artefacts | Select-Object -First 1).Directory.FullName
          Copy-Item windows\README-WINDOWS.txt "$binDir\README.txt" -Force
          $buildInfo = "Build commit: $env:GITHUB_SHA`r`nBuilt on: $(Get-Date -Format 'yyyy-MM-dd HH:mm')`r`nRunner: windows-2022 x64"
          Set-Content -Path "$binDir\BUILD-INFO.txt" -Value $buildInfo -Encoding UTF8
          Get-ChildItem $binDir

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UG6Broadcaster-Windows
          path: build/UG6Broadcaster_artefacts/
          if-no-files-found: error
